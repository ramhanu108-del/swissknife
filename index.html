<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTools Hub - All Tools Included</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-100 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i data-lucide="wrench"></i></div>
                <span class="text-xl font-extrabold">SmartTools <span class="text-blue-600">Hub</span></span>
            </div>
            <button id="themeToggle" class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                <i data-lucide="moon" id="moonIcon"></i>
                <i data-lucide="sun" id="sunIcon" class="hidden"></i>
            </button>
        </div>
    </nav>

    <main id="app">
        <section id="hero" class="pt-20 pb-12 px-4 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">Complete <span class="text-blue-600">Smart Utility</span> Suite</h1>
            <p class="text-gray-500 mb-8">Access all 33+ browser-based tools for free, anywhere.</p>
            
            <div class="relative max-w-xl mx-auto mb-10">
                <input type="text" id="toolSearch" placeholder="Search 33+ tools..." class="w-full pl-12 pr-6 py-4 rounded-xl bg-white dark:bg-gray-900 border-2 border-gray-100 dark:border-gray-800 outline-none focus:border-blue-500 shadow-lg">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><i data-lucide="search"></i></div>
            </div>

            <div id="categoryTabs" class="flex flex-wrap justify-center gap-2"></div>
        </section>

        <section class="max-w-7xl mx-auto px-4 pb-20">
            <div id="toolGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="emptySearch" class="hidden py-20 text-center text-gray-400">No tools found matching your search.</div>
        </section>

        <section id="toolView" class="hidden fixed inset-0 z-[60] bg-white dark:bg-gray-950 overflow-y-auto p-4 md:p-10">
            <div class="max-w-4xl mx-auto">
                <button onclick="goHome()" class="mb-8 flex items-center gap-2 text-blue-600 font-bold hover:translate-x-[-4px] transition-transform">
                    <i data-lucide="arrow-left"></i> Back to Tools
                </button>
                <div id="toolInterface" class="bg-white dark:bg-gray-900 p-8 rounded-3xl border border-gray-100 dark:border-gray-800 shadow-2xl"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
